<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt | GISzona</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<header class="nav">
    <div class="logo">giszona<span>.net</span></div>
    <nav>
        <a href="index.html">Početna</a>
        <a href="projekti.html">Projekti</a>
        <a href="blog.html">Blog</a>
        <a href="resources.html">Resources</a>
        <a href="kontakt.html">Kontakt</a>
    </nav>
</header>
<section class="about" style="max-width: 600px; margin: 50px auto; padding: 40px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
    <h2>Kontaktirajte me</h2>
    <p>Imate li pitanje o GIS projektima ili trebate konzultacije? Pošaljite poruku putem forme ispod.</p>

    <form id="contact-form" action="https://formspree.io/f/xwvrppak" method="POST" style="display: flex; flex-direction: column; gap: 15px; text-align: left; margin-top: 20px;">
        <label>Vaše ime:
            <input type="text" name="name" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
        </label>
        
        <label>Vaš e-mail:
            <input type="email" name="email" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
        </label>
        
        <label>Poruka:
            <textarea name="message" rows="5" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-family: inherit;"></textarea>
        </label>

        <button type="submit" class="cta" style="width: 100%; padding: 12px; cursor: pointer; border: none; font-size: 16px;">Pošalji poruku</button>
        <p id="form-status" style="margin-top: 10px; text-align: center; font-weight: bold;"></p>
    </form>
</section>

<script>
    const form = document.getElementById("contact-form");
    const status = document.getElementById("form-status");

    async function handleSubmit(event) {
      event.preventDefault();
      const data = new FormData(event.target);
      
      fetch(event.target.action, {
        method: form.method,
        body: data,
        headers: {
            'Accept': 'application/json'
        }
      }).then(response => {
        if (response.ok) {
          // USPJEH: Vodi na tvoju stranicu hvala.html
          window.location.href = "hvala.html";
        } else {
          response.json().then(data => {
            if (Object.hasOwn(data, 'errors')) {
              status.style.color = "red";
              status.innerHTML = data["errors"].map(error => error["message"]).join(", ");
            } else {
              status.style.color = "red";
              status.innerHTML = "Ups! Došlo je do problema pri slanju.";
            }
          })
        }
      }).catch(error => {
        status.style.color = "red";
        status.innerHTML = "Došlo je do greške pri povezivanju sa serverom.";
      });
    }
    form.addEventListener("submit", handleSubmit)
</script>

</body>
</html>

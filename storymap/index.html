<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StoryMap Banija - GISzona</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        body, html { height: 100%; margin: 0; overflow: hidden; }
        /* Osiguravamo da container za kartu zauzima ostatak ekrana */
        .storymap-container { 
            width: 100%; 
            height: calc(100vh - 70px); 
            border: none; 
        }
        /* Ako tvoj include generira iframe, ovo ga rasteže */
        .storymap-container iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="logo"><strong>giszona</strong><span class="green-text">.net</span></div>
        <div class="links">
            <a href="../index.html">Početna</a>
            <a href="../projekti.html">Projekti</a>
            <a href="../blog.html">Blog</a>
            <a href="../resources.html">Resources</a>
        </div>
    </nav>

    <div class="storymap-info-box" id="infoBox">
        <button class="toggle-btn" id="toggleBtn">−</button>
        <h2 style="margin-top:0; font-size:18px;">Hidrogeološka istraživanja - Banija</h2>
        <div id="boxContent">
            <p>ArcGIS StoryMap diplomskog rada izrađenog nakon potresa na Banovini.</p>
            <p><strong>Diplomski rad:</strong> 
                <a href="https://zir.nsk.hr/object/rgn:2153" target="_blank" style="color: #4CAF50; text-decoration: underline;">Pogledaj na ZIR-u</a>
            </p>
        </div>
    </div>

    <div class="storymap-container">
        {% include storymap.html %}
    </div>

    <script>
        const btn = document.getElementById('toggleBtn');
        const box = document.getElementById('infoBox');
        const content = document.getElementById('boxContent');

        btn.addEventListener('click', function() {
            if (box.classList.contains('minimized-box')) {
                box.classList.remove('minimized-box');
                content.style.display = "block";
                btn.innerHTML = "−";
            } else {
                box.classList.add('minimized-box');
                content.style.display = "none";
                btn.innerHTML = "+";
            }
        });
    </script>
</body>
</html>

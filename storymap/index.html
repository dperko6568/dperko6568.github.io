<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StoryMap Banija</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        body, html { height: 100%; margin: 0; }
        iframe { width: 100%; height: calc(100vh - 70px); border: none; }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="logo"><strong>giszona</strong>.net</div>
        <div class="links">
            <a href="../index.html">Početna</a>
            <a href="../projekti.html">Projekti</a>
            <a href="../blog.html">Blog</a>
            <a href="../resources.html">Resources</a>
        </div>
    </nav>

    <div class="storymap-info-box" id="infoBox">
        <button class="toggle-btn" id="toggleBtn">−</button>
        <h2 style="margin-top:0; font-size:18px;">StoryMap o Baniji</h2>
        <div id="boxContent">
            <p>Ova karta prikazuje analizu potresa i obnovu na području Banovine.</p>
            <p>Kliknite na elemente karte za više informacija.</p>
        </div>
    </div>

    <iframe src="https://arcg.is/00eO5O"></iframe>

    <script>
        const btn = document.getElementById('toggleBtn');
        const box = document.getElementById('infoBox');
        const content = document.getElementById('boxContent');

        btn.addEventListener('click', function() {
            if (box.classList.contains('minimized-box')) {
                box.classList.remove('minimized-box');
                content.style.display = "block";
                btn.innerHTML = "−";
            } else {
                box.classList.add('minimized-box');
                content.style.display = "none";
                btn.innerHTML = "+";
            }
        });
    </script>
</body>
</html>

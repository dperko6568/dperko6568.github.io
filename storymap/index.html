---
layout: default
title: StoryMap Banija
---

<link rel="stylesheet" href="../assets/css/style.css">

<style>
    /* Popravak za tamni box jer se stilovi nekad ne povuku dobro */
    .storymap-info-box {
        position: absolute;
        top: 100px;
        left: 20px;
        width: 320px;
        background: rgba(0, 0, 0, 0.85) !important; /* Forsiramo tamnu boju */
        color: white !important;
        padding: 20px;
        border-radius: 8px;
        z-index: 1000;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    .storymap-info-box p, .storymap-info-box h2 { color: white !important; }
    
    .storymap-container { 
        width: 100%; 
        height: calc(100vh - 70px); 
        margin-top: 0;
    }
</style>

<div class="storymap-info-box" id="infoBox">
    <button class="toggle-btn" id="toggleBtn" style="position: absolute; top: 10px; right: 10px; cursor: pointer;">−</button>
    <h2 style="margin-top:0; font-size:18px;">Hidrogeološka istraživanja - Banija</h2>
    <div id="boxContent">
        <p>ArcGIS StoryMap diplomskog rada izrađenog nakon potresa na Banovini.</p>
        <p><strong>Diplomski rad:</strong> 
            <a href="https://zir.nsk.hr/object/rgn:2153" target="_blank" style="color: #4CAF50; text-decoration: underline;">Pogledaj na ZIR-u</a>
        </p>
    </div>
</div>

<div class="storymap-container">
    {% include storymap.html %}
</div>

<script>
    const btn = document.getElementById('toggleBtn');
    const box = document.getElementById('infoBox');
    const content = document.getElementById('boxContent');

    if (btn) {
        btn.addEventListener('click', function() {
            if (box.classList.contains('minimized-box')) {
                box.classList.remove('minimized-box');
                content.style.display = "block";
                btn.innerHTML = "−";
            } else {
                box.classList.add('minimized-box');
                content.style.display = "none";
                btn.innerHTML = "+";
            }
        });
    }
</script>

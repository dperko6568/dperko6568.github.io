<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StoryMap Banija - GISzona</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        /* Osnovni reset i layout */
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: Arial, sans-serif; }
        
        /* Navigacija fiksne visine */
        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            height: 60px;
            position: relative;
            z-index: 2000;
        }

        /* Tamni info box - Forsirano crna pozadina */
        .storymap-info-box {
            position: absolute;
            top: 80px;
            left: 20px;
            width: 300px;
            background: rgba(0, 0, 0, 0.85) !important;
            color: white !important;
            padding: 20px;
            border-radius: 8px;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        /* Gumb za skupljanje */
        .toggle-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #3f8f3f;
            border: none;
            color: white;
            width: 26px;
            height: 26px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Stanje kad je box skupljen */
        .minimized-box {
            height: 45px !important;
            width: 200px !important;
            overflow: hidden !important;
            padding: 10px !important;
        }

        /* Container za StoryMapu */
        .storymap-container {
            width: 100%;
            height: calc(100vh - 60px);
            border: none;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Zeleni tekst logotipa */
        .green-text { color: #3f8f3f; font-weight: bold; }

        /* Mobilne prilagodbe */
        @media (max-width: 600px) {
            .storymap-info-box { width: 90%; left: 5%; top: 70px; }
            .nav { height: auto; padding: 10px; flex-direction: column; gap: 5px; }
            .storymap-container { height: calc(100vh - 100px); }
        }
    </style>
</head>
<body>

    <nav class="nav">
        <div class="logo"><strong>giszona</strong><span class="green-text">.net</span></div>
        <div class="links">
            <a href="../index.html" style="text-decoration:none; color:#333; margin-left:15px;">Početna</a>
            <a href="../projekti.html" style="text-decoration:none; color:#333; margin-left:15px;">Projekti</a>
        </div>
    </nav>

    <div class="storymap-info-box" id="infoBox">
        <button class="toggle-btn" id="toggleBtn">−</button>
        <h2 style="margin:0; font-size:18px; color: white !important;">StoryMap o Baniji</h2>
        <div id="boxContent">
            <p style="font-size: 14px; color: #eee !important; margin: 15px 0 10px 0;">
                Hidrogeološka istraživanja na Banovini nakon potresa.
            </p>
            <p style="margin:0;">
                <a href="https://zir.nsk.hr/object/rgn:2153" target="_blank" style="color: #4CAF50; font-weight:bold; text-decoration: none;">Diplomski rad (ZIR) →</a>
            </p>
        </div>
    </div>

    <div class="storymap-container">
        <iframe src="https://storymaps.arcgis.com/stories/3b6c1ec44b7946d79fc035de95e5b4a3?"></iframe>
    </div>

    <script>
        const btn = document.getElementById('toggleBtn');
        const box = document.getElementById('infoBox');
        const content = document.getElementById('boxContent');

        btn.addEventListener('click', function() {
            if (box.classList.contains('minimized-box')) {
                box.classList.remove('minimized-box');
                content.style.display = "block";
                btn.innerHTML = "−";
            } else {
                box.classList.add('minimized-box');
                content.style.display = "none";
                btn.innerHTML = "+";
            }
        });
    </script>
</body>
</html>
